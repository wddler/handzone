name: handzone
services:
  db:
    image: postgres:16.2
    restart: always
    ports:
      - 5432:5432
    container_name: handzone-db
    volumes:
      - database:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: "${DATABASE_PASSWORD}"
      POSTGRES_USER: "${DATABASE_USER}"
      POSTGRES_DB: handzone

  app-dev:
    build:
      context: .
      dockerfile: dockerfile-dev
    env_file:
      - .env
    restart: always
    ports: 
      - "3000:3000"
      - "4000:4000"
      - "5900:5900"
    container_name: handzone-dev
    environment:
      VIRTUAL_HOST: ${HOSTNAME}
      DATABASE_URL: "postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@db/handzone?schema=public"
    volumes:
      - type: bind
        source: ./
        target: /app
      # Use container-managed volumes to avoid host permission issues and speed up rebuilds
      - /app/node_modules
      - /app/.next
      - /app/logs
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    depends_on:
      - db

    # Ensure DB schema exists before starting dev server
    command: >-
      sh -c "
      (npx prisma generate || true) &&
      until npx prisma migrate deploy; do echo 'Waiting for database...'; sleep 2; done &&
      ./node_modules/.bin/tsx src/server/index.ts
      "

networks:
  default:
    name: ${DOCKER_NETWORK}

volumes:
  database:
