name: handzone
services:
  ursim:
    image: ghcr.io/newmedia-centre/ursim_cb3:3.15.8
    container_name: ursim_cb3_3_15_8
    restart: unless-stopped
    ports:
      # UR dashboard/server + RTDE/primary/secondary interfaces
      - "29999:29999"
      - "30001:30001"
      - "30002:30002"
      - "30003:30003"
      # VNC + noVNC web UI
      - "5990:5900"
      - "6080:6080"
    environment:
      # Optional: set robot model if supported by image
      # ROBOT_MODEL: UR5
      TZ: UTC
    # Uncomment to persist any simulator data if needed
    # volumes:
    #   - ursim-data:/ursim
    networks:
      - default

# volumes:
#   ursim-data:

networks:
  default:
    name: ${DOCKER_NETWORK}
